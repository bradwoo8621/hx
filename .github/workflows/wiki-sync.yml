name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: bradwoo8621/hx.wiki
          path: .wiki-repo
          token: ${{ secrets.WIKI_SYNC_TOKEN }}
      - name: Sync wiki
        run: |
          rm -rf .wiki-repo/*
          cp -r wiki/* .wiki-repo/
          cd .wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "sync wiki from main"
          git remote set-url origin "https://x-access-token:${{ secrets.WIKI_SYNC_TOKEN }}@github.com/bradwoo8621/hx.wiki.git"
          git push