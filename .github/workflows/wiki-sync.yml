name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: bradwoo8621/hx.wiki
          path: .wiki-repo
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          rm -rf .wiki-repo/*
          cp -r wiki/* .wiki-repo/
          cd .wiki-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "sync wiki from main"
          git push